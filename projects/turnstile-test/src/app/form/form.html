<form [formGroup]="form" (ngSubmit)="moveOn()">
    <input type="text" placeholder="Nonsense" />
    <ngx-turnstile formControlName="turnstile" siteKey="0x4AAAAAACowXhAjg-rA1q-n" theme="light" retry="never" />
    <button type="submit" [disabled]="form.touched && form.invalid">Submit</button>
</form>
